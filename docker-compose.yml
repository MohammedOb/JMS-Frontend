services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    ports:
      - "3000:3000"   # exposes frontend to host so cloudflared can reach it at localhost:3000
    environment:
      - PAYMENT_URL_SECRET=${PAYMENT_URL_SECRET}
